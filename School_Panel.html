<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="./fevicon.png">
    <link rel="apple-touch-icon" href="./idapplogo.png">
    <title id="page-title">IDentify</title>
    <!-- External Libraries -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, limit, setDoc, onSnapshot, getDoc, runTransaction, enableMultiTabIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, sendPasswordResetEmail, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        import { firebaseConfig } from "./firebase-env.js";

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            enableMultiTabIndexedDbPersistence(window.db).catch((err) => {
                if (err.code == 'failed-precondition') {
                    console.warn("Multiple tabs open, persistence can only be enabled in one tab at a time.");
                } else if (err.code == 'unimplemented') {
                    console.warn("Browser does not support persistence");
                }
            });
            window.auth = getAuth(app);
            window.storage = getStorage(app);

            window.firebaseAPI = {
                initializeApp, getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, sendPasswordResetEmail, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged,
                db: window.db, auth: window.auth, storage: window.storage, firebaseConfig,
                collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, limit, setDoc, onSnapshot, getDoc, runTransaction,
                signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendPasswordResetEmail, createUserWithEmailAndPassword,
                getStorage, ref, uploadString, getDownloadURL,
                firebaseConfig
            };
            console.log("Firebase initialized successfully.");

            onAuthStateChanged(window.auth, (user) => {
                if (!user) {
                    logoutUser();
                } else {
                                pullIndicator.innerHTML = '<div class="text-center py-4 text-emerald-600 font-bold flex flex-col items-center justify-center gap-2 bg-emerald-50 shadow-inner"><i class="fa-solid fa-arrow-down animate-bounce text-xl"></i><span>Pull to refresh</span></div>';
                            }
                        }
                    }, {passive: true});

                    container.addEventListener('touchend', (e) => {
                        if (!isPulling) return;
                        isPulling = false;
                        
                        if (pullIndicator) {
                            const height = parseInt(pullIndicator.style.height) || 0;
                            if (height >= pptrThreshold) {
                                pullIndicator.innerHTML = '<div class="text-center py-4 text-emerald-600 font-bold flex flex-col items-center justify-center gap-2 bg-emerald-100 shadow-inner"><i class="fa-solid fa-rotate animate-spin text-xl"></i><span>Syncing in background...</span></div>';
                                
                                // Collapse indicator immediately back to normal
                                setTimeout(() => {
                                    if (pullIndicator) {
                                        pullIndicator.style.height = '0px';
                                        setTimeout(() => {
                                            if (pullIndicator) {
                                                pullIndicator.remove();
                                                pullIndicator = null;
                                            }
                                        }, 300);
                                    }
                                }, 400);

                                // Trigger database sync in the background silently
                                loadAllData(() => {
                                    showToast('Data Synced & Updated!');
                                });
                            } else {
                                pullIndicator.style.height = '0px';
                                setTimeout(() => {
                                    if (pullIndicator) {
                                        pullIndicator.remove();
                                        pullIndicator = null;
                                    }
                                }, 300);
                            }
                        }
                    });
                });
            }

            function setupFilterCardLongPress(elementId, filterType, isBin = false) {
                const el = document.getElementById(elementId);
                if (!el) return;
                
                let lpTimer;
                let lpTriggered = false;
                
                const startLP = (e) => {
                    if (e.type === 'mousedown' && e.button !== 0) return;
                    lpTriggered = false;
                    lpTimer = setTimeout(() => {
                        lpTriggered = true;
                        if (navigator.vibrate) navigator.vibrate(50);
                        
                        if (isBin) {
                            openRecycleBin();
                            setTimeout(() => {
                                if (!Array.isArray(bin) || bin.length === 0) return;
                                toggleAllBinSelection();
                            }, 100);
                        } else {
                            showTab('records');
                            setChipFilter('status', filterType);
                            setTimeout(() => {
                                if (selectedRecords.size === 0) {
                                    bulkToggleSelectAll();
                                }
                            }, 100);
                        }
                    }, 500);
                };
                
                const cancelLP = () => { if (lpTimer) clearTimeout(lpTimer); };
                
                el.addEventListener('mousedown', startLP);
                el.addEventListener('touchstart', startLP, {passive: true});
                el.addEventListener('mouseup', (e) => {
                    cancelLP();
                    if (lpTriggered) { e.preventDefault(); e.stopPropagation(); }
                });
                el.addEventListener('touchend', cancelLP);
                el.addEventListener('mouseleave', cancelLP);
                el.addEventListener('touchcancel', cancelLP);
                el.addEventListener('click', (e) => {
                    if (lpTriggered) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                }, true);
            }

            function setupEventDelegation() {
                const container = document.getElementById('records-list-container');
                if (!container) return;

                container.addEventListener('mousedown', handleSelectionZoneEvent);
                container.addEventListener('touchstart', handleSelectionZoneEvent, {passive: true});
                container.addEventListener('mouseup', handleSelectionZoneEvent);
                container.addEventListener('touchend', handleSelectionZoneEvent);
                container.addEventListener('mouseleave', handleSelectionZoneEvent);
                container.addEventListener('touchcancel', handleSelectionZoneEvent);
                container.addEventListener('click', handleContainerClick);

                const binContainer = document.getElementById('bin-content');
                if (binContainer) {
                    binContainer.addEventListener('mousedown', handleBinSelectionZoneEvent);
                    binContainer.addEventListener('touchstart', handleBinSelectionZoneEvent, {passive: true});
                    binContainer.addEventListener('mouseup', handleBinSelectionZoneEvent);
                    binContainer.addEventListener('touchend', handleBinSelectionZoneEvent);
                    binContainer.addEventListener('mouseleave', handleBinSelectionZoneEvent);
                    binContainer.addEventListener('touchcancel', handleBinSelectionZoneEvent);
                    binContainer.addEventListener('click', handleBinContainerClick);
                }

                // Add Filter Card Long Press Support
                setupFilterCardLongPress('home-btn-unverified', 'unverified', false);
                setupFilterCardLongPress('home-btn-pending', 'pending', false);
                setupFilterCardLongPress('btn-unverified', 'unverified', false);
                setupFilterCardLongPress('btn-pending', 'pending', false);
                setupFilterCardLongPress('btn-recycle-bin', 'recycleBin', true);
            }

        function handleBinSelectionZoneEvent(e) {
            const zone = e.target.closest('.bin-selection-zone');
            if (!zone) return;
            const id = zone.dataset.id;
            
            if (e.type === 'mousedown' || e.type === 'touchstart') {
                binLpStart(id);
            } else if (['mouseup', 'touchend', 'mouseleave', 'touchcancel'].includes(e.type)) {
                binLpCancel();
            }
        }

        function handleBinContainerClick(e) {
            const selectionZone = e.target.closest('.bin-selection-zone');
            if (selectionZone) {
                const id = selectionZone.dataset.id;
                if (binSelectedRecords.size > 0) {
                    e.stopPropagation(); e.preventDefault();
                    if (typeof binLpDidTrigger !== 'undefined' && binLpDidTrigger) {
                        binLpDidTrigger = false;
                        return;
                    }
                    toggleBinSelection(id);
                }
            }
        }

            function handleSelectionZoneEvent(e) {
                const zone = e.target.closest('.record-selection-zone');
                if (!zone) return;
                const id = zone.dataset.id;
                const hasDoc = zone.dataset.hasdoc === 'true';
                
                if (e.type === 'mousedown' || e.type === 'touchstart') {
                    lpStart(id, hasDoc);
                } else if (['mouseup', 'touchend', 'mouseleave', 'touchcancel'].includes(e.type)) {
                    lpCancel();
                }
            }

            function handleContainerClick(e) {
                const previewZone = e.target.closest('.record-preview-zone');
                if (previewZone) {
                    const id = previewZone.dataset.id;
                    const noDoc = previewZone.dataset.hasdoc === 'true';
                    openStudentDetailPopup(id, false, noDoc);
                    return;
                }

                const selectionZone = e.target.closest('.record-selection-zone');
                if (selectionZone) {
                    const id = selectionZone.dataset.id;
                    const hasDoc = selectionZone.dataset.hasdoc === 'true';
                    lpClick(id, e, hasDoc);
                    return;
                }
            }

            function init() {
                try {
                    currentUser = loadAuthUser();
                    if (typeof lucide !== 'undefined') {
                        try {
                            lucide.createIcons();
                        } catch (e) {
                            console.warn('Lucide icons load warning:', e.message);
                        }
                    }
                    try {
                        updateBrandingUI();
                        fetchSystemConfigFromFirebase();
                    } catch (e) {
                        console.warn('Branding UI load warning:', e.message);
                    }

                    fb_bootFromStorage();
                    setupPhotoUpload();
                    setupFormAutosave();
                    setupAutoLogoutTracking();
                    setupLoginUi();
                    setupPullToRefresh();
                    setupEventDelegation();

                    // Splash screen will be hidden by requireLoginAndBoot after auth state check

                    // Fallback binding for environments where inline onclick is unreliable.
                    const homeBtn = document.getElementById('btn-tab-home');
                    const newBtn = document.getElementById('btn-tab-new');
                    const dbBtn = document.getElementById('btn-tab-db');
                    if (homeBtn) homeBtn.addEventListener('click', () => showTab('records'));
                    if (newBtn) newBtn.addEventListener('click', () => showTab('newEntry'));
                    if (dbBtn) dbBtn.addEventListener('click', () => showTab('records'));

                    showTab('records', { pushHistory: false, replaceHistory: true });
                    restoreDraft();
                    updateCurrentUserUi();
                    requireLoginAndBoot();
                    // Ensure popstate is handled by app navigation
                    window.addEventListener('popstate', handleBrowserNavigation);

                    // Push a small guard history entry so device back button triggers popstate
                    // instead of closing the browser/tab immediately. This allows app to
                    // intercept and perform in-app back navigation.
                    try {
                        const guardState = { appGuard: true, appTab: currentTab, appHistoryDepth };
                        window.history.replaceState({ appTab: currentTab, appHistoryDepth }, '', window.location.href);
                        window.history.pushState(guardState, '', window.location.href);
                    } catch (e) {
                        // Ignore if history API is not available
                    }
                } catch (error) {
                    alert('Initialization Error: ' + (error.stack || error.message || error));
                }
            }

            function normalizeRecordsPayload(records) {
                if (Array.isArray(records)) return records;
                if (typeof records === 'string') {
                    try {
                        const parsed = JSON.parse(records);
                        if (Array.isArray(parsed)) return parsed;
                        if (parsed && Array.isArray(parsed.records)) return parsed.records;
                        if (parsed && Array.isArray(parsed.data)) return parsed.data;
                        if (parsed && Array.isArray(parsed.rows)) return parsed.rows;
                        return [];
                    } catch (e) {
                        return [];
                    }
                }
                if (records && Array.isArray(records.records)) return records.records;
                if (records && Array.isArray(records.data)) return records.data;
                if (records && Array.isArray(records.rows)) return records.rows;
                return [];
            }

            const RECORDS_CACHE_KEY = 'identify_db_cache_v1';
            const BIN_CACHE_KEY = 'identify_bin_cache_v1';

            // --- IndexedDB Offline Storage (for large datasets + images) ---
            const IDB_NAME = 'identify_offline_db_v1';
            const IDB_VERSION = 1;
            const IDB_STORE_RECORDS = 'records';
            const IDB_STORE_ATTACH = 'attachments';

            function openIDB() {
                return new Promise((resolve, reject) => {
                    if (!window.indexedDB) return resolve(null);
                    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(IDB_STORE_RECORDS)) db.createObjectStore(IDB_STORE_RECORDS, { keyPath: 'id' });
                        if (!db.objectStoreNames.contains(IDB_STORE_ATTACH)) db.createObjectStore(IDB_STORE_ATTACH, { keyPath: 'id' });
                    };
                    req.onsuccess = (e) => resolve(e.target.result);
                    req.onerror = (e) => reject(e.target.error);
                });
            }

            function idbPut(storeName, value) {
                return openIDB().then(db => {
                    if (!db) return Promise.reject(new Error('IndexedDB not available'));
                    return new Promise((res, rej) => {
                        const tx = db.transaction([storeName], 'readwrite');
                        const store = tx.objectStore(storeName);
                        store.put(value);
                        tx.oncomplete = () => res(value);
                        tx.onerror = () => rej(tx.error || new Error('IDB tx error'));
                    });
                });
            }

            function idbGetAll(storeName) {
                if (storeName === IDB_STORE_RECORDS) return Promise.resolve([]);
                return new Promise((resolve, reject) => {
                    openIDB().then(db => {
                        const tx = db.transaction(storeName, 'readonly');
                        const store = tx.objectStore(storeName);
                        const request = store.getAll();
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error);
                    }).catch(reject);
                });
            }

            function idbGet(storeName, key) {
                if (storeName === IDB_STORE_RECORDS) return Promise.resolve(null);
                return new Promise((resolve, reject) => {
                    openIDB().then(db => {
                        const tx = db.transaction(storeName, 'readonly');
                        const store = tx.objectStore(storeName);
                        const request = store.get(key);
                        request.onsuccess = () => resolve(request.result);
                        request.onerror = () => reject(request.error);
                    }).catch(reject);
                });
            }

            function idbDelete(storeName, key) {
                if (storeName === IDB_STORE_RECORDS) return Promise.resolve();
                return openIDB().then(db => {
                    return new Promise((res, rej) => {
                        const tx = db.transaction([storeName], 'readwrite');
                        const store = tx.objectStore(storeName);
                        store.delete(key);
                        tx.oncomplete = () => res();
                        tx.onerror = () => rej(tx.error || new Error('IDB delete error'));
                    });
                });
            }

            function idbClear(storeName) {
                return openIDB().then(db => {
                    if (!db) return Promise.resolve();
                    return new Promise((res, rej) => {
                        const tx = db.transaction([storeName], 'readwrite');
                        const store = tx.objectStore(storeName);
                        store.clear();
                        tx.oncomplete = () => res();
                        tx.onerror = () => rej(tx.error || new Error('IDB clear error'));
                    });
                });
            }

            function saveRecordLocally(record, imageBlob) {
                // record must have `id`
                if (!record || !record.id) return Promise.reject(new Error('Record must have id'));
                const copy = { ...record, _pending: true, _savedAt: Date.now() };
                return idbPut(IDB_STORE_RECORDS, copy).then(() => {
                    if (imageBlob) {
                        const attachId = `${record.id}::photo`;
                        return idbPut(IDB_STORE_ATTACH, { id: attachId, blob: imageBlob, savedAt: Date.now() });
                    }
                });
            }

            function getPendingLocalRecords() {
                return idbGetAll(IDB_STORE_RECORDS).then(rows => (rows || []).filter(r => r._pending));
            }

            function blobToDataUrl(blob) {
                return new Promise((res, rej) => {
                    if (!blob) return res(null);
                    const fr = new FileReader();
                    fr.onload = () => res(fr.result);
                    fr.onerror = () => rej(fr.error);
                    fr.readAsDataURL(blob);
                });
            }

            function dataUrlToBlob(dataUrl) {
                if (!dataUrl) return null;
                const parts = dataUrl.split(',');
                const meta = parts[0] || '';
                const b64 = parts[1] || '';
                const m = (meta.match(/data:(.*?);base64/) || [])[1] || 'image/jpeg';
                const binary = atob(b64);
                const len = binary.length;
                const u8 = new Uint8Array(len);
                for (let i = 0; i < len; i++) u8[i] = binary.charCodeAt(i);
                return new Blob([u8], { type: m });
            }

            function setRecordSyncState(recordOrId, status) {
                const id = typeof recordOrId === 'object' ? recordOrId.id : recordOrId;
                if (!id) return null;
                const idx = db.findIndex(r => String(r.id) === String(id));
                const now = Date.now();
                let target = idx >= 0 ? db[idx] : (typeof recordOrId === 'object' ? recordOrId : null);
                if (!target) return null;
                target._syncStatus = status;
                target._syncStartedAt = status === 'syncing' ? now : (target._syncStartedAt || '');
                target._syncedAt = status === 'synced' ? now : (target._syncedAt || '');
                target._serverSaved = status === 'synced';
                target._pending = status !== 'synced';
                if (idx >= 0) db[idx] = target;
                if (previewRecord && String(previewRecord.id) === String(id)) previewRecord = { ...previewRecord, ...target };
                
                try { if (window.idbPut) idbPut(IDB_STORE_RECORDS, { ...target }).catch(() => { }); } catch (e) { }

                // If synced and has a different old ID, delete the old ID from local array and IndexedDB cache
                if (status === 'synced' && target.oldId && String(target.oldId) !== String(target.id)) {
                    db = db.filter(r => String(r.id) !== String(target.oldId));
                    try { if (window.idbDelete) idbDelete(IDB_STORE_RECORDS, target.oldId).catch(() => { }); } catch (e) { }
                    setTimeout(() => {
                        filterRecords();
                        renderHomeAnalysis();
                    }, 10);
                }

                return target;
            }

            async function uploadVerifiedRecordPhoto(record) {
                // Firebase Storage charges money, so we bypass it and rely on Firestore photoData (base64)
                return { ...record };
            }

            async function syncVerifiedRecordToGoogle(recordOrId) {
                const id = typeof recordOrId === 'object' ? recordOrId.id : recordOrId;
                const source = db.find(r => String(r.id) === String(id)) || (typeof recordOrId === 'object' ? recordOrId : null);
                if (!source || !(source.verified === true || String(source.verified).toLowerCase() === 'true')) return;
                
                const syncingRec = setRecordSyncState(source, 'syncing') || source;
                renderCurrentRecordsPage();
                try {
                    const withPhoto = await uploadVerifiedRecordPhoto(syncingRec);
                    const finalRec = { ...syncingRec, ...withPhoto, _syncStatus: 'syncing', _pending: true };
                    // Attach QR Code enable state
                    finalRec.qrEnabled = localStorage.getItem('identify_qr_enabled') === 'true';
                    
                    await new Promise((resolve, reject) => {
                        serverCallSilent('updateRecord', [finalRec], () => resolve(), reject);
                    });
                    setRecordSyncState(finalRec, 'synced');
                    renderCurrentRecordsPage();
                } catch (err) {
                    console.error('Verified sync failed:', err);
                    setRecordSyncState(syncingRec, 'pending');
                    renderCurrentRecordsPage();
                }
            }

            async function syncAllVerifiedRecordsToGoogle() {
                const verifiedRows = (db || []).filter(r => (r.verified === true || String(r.verified).toLowerCase() === 'true') && r._syncStatus !== 'synced');
                for (let i = 0; i < verifiedRows.length; i++) {
                    setSyncStatus(`Syncing verified ${i + 1} / ${verifiedRows.length}`, Math.round(((i + 1) / Math.max(verifiedRows.length, 1)) * 90));
                    await syncVerifiedRecordToGoogle(verifiedRows[i]);
                }
            }

            // Sync pending IDB records to server (uploads images first then record payload)
            async function syncLocalDatabase() {
                try {
                    setSyncStatus('Syncing local records...', 5);
                    const pending = await getPendingLocalRecords();
                    if (!pending || pending.length === 0) {
                        setSyncStatus('No pending local records', 100);
                        setTimeout(() => setSyncStatus(''), 1200);
                        return;
                    }

                    // Only sync records that are marked as verified
                    const verifiedPending = (pending || []).filter(r => (r && (r.verified === true || String(r.verified).toLowerCase() === 'true')));
                    for (let i = 0; i < verifiedPending.length; i++) {
                        const rec = verifiedPending[i];
                        // If attachment exists, upload first
                        const attachId = `${rec.id}::photo`;
                        const attach = await idbGet(IDB_STORE_ATTACH, attachId).catch(() => null);
                        if (attach && attach.blob) {
                            // Convert to dataURL
                            const dataUrl = await blobToDataUrl(attach.blob);
                            const payload = dataUrlToUploadPayload(dataUrl, (rec.fileName || (rec.studentName || 'photo') + '.jpg'), attach.blob.type || 'image/jpeg', (rec.id + '_' + (rec.studentName || 'photo')).replace(/\s+/g, '_'));
                            // uploadRecordDocument is expected on Apps Script to accept base64 payload
                            await new Promise((resolve, reject) => {
                                serverCallSilent('uploadRecordDocument', [payload], (meta) => {
                                    if (meta) {
                                        rec.docFileId = meta.fileId || rec.docFileId || '';
                                        rec.docUrl = meta.previewUrl || meta.url || rec.docUrl || '';
                                        rec.docMimeType = meta.mimeType || rec.docMimeType || '';
                                        rec.docSize = meta.size || rec.docSize || '';
                                    }
                                    resolve();
                                }, (err) => reject(new Error('Photo upload failed: ' + (err ? err.message : 'Unknown error'))));
                            });
                        }

                        // Attach QR Code enable state
                        if (rec) rec.qrEnabled = localStorage.getItem('identify_qr_enabled') === 'true';

                        // Send or update record on server
                        await new Promise((resolve) => {
                            const action = (rec && rec.id && String(rec.id).startsWith('NEW-')) ? 'addRecord' : 'updateRecord';
                            serverCall(action, [rec], (res) => {
                                // Mark local record as synced on success
                                rec._pending = false;
                                rec._syncStatus = 'synced';
                                rec._serverSaved = true;
                                rec._syncedAt = Date.now();
                                idbPut(IDB_STORE_RECORDS, rec).catch(() => { });
                                resolve();
                            }, () => {
                                // If server not available, keep pending
                                resolve();
                            });
                        });
                        setSyncStatus(`Synced ${i + 1} / ${verifiedPending.length}`, Math.round(((i + 1) / verifiedPending.length) * 90) + 5);
                    }

                    // After sync, refresh UI from server
                    loadAllData();
                    setSyncStatus('Local Sync Complete', 100);
                    setTimeout(() => setSyncStatus(''), 1500);
                } catch (err) {
                    console.error('syncDatabase error', err);
                    setSyncStatus('Sync failed', 10);
                    setTimeout(() => setSyncStatus(''), 1500);
                }
            }

            // Integrate IDB into initial load: when attempt===0 prefer IDB snapshot if present

            function loadAllData(done) {
                console.log('[loadAllData] fetching fresh data from Firebase...');
                
                // Fetch from server directly without local cache
                serverCallSilent('getRecords', [], (serverDb) => {
                    if (serverDb && Array.isArray(serverDb)) {
                        // Mark all records fetched from server as successfully synced
                        serverDb.forEach(r => {
                            if (r && (r.verified === true || String(r.verified).toLowerCase() === 'true')) {
                                r._syncStatus = 'synced';
                                r._serverSaved = true;
                                r._pending = false;
                            }
                        });
                        
                        const pendingLocal = (typeof db !== 'undefined' ? db : []).filter(r => r._pending || r._syncStatus === 'syncing' || r._syncStatus === 'pending');
                        const serverFiltered = filterDeletedFromList([...serverDb]);
                        const mergedDb = serverFiltered.map(sRec => {
                            const lRec = pendingLocal.find(l => String(l.id) === String(sRec.id) || (l.oldId && String(l.oldId) === String(sRec.id)));

                let id = '';
                if (url.includes('/d/')) {
                    const parts = url.split('/d/');
                    if (parts.length > 1) id = parts[1].split('/')[0].split('?')[0].split('&')[0].split('#')[0];

            function xorCipher(str, key = 'IdentifySecretKey') {
                let result = '';
                for (let i = 0; i < str.length; i++) {
                    result += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return result;
            }
            function encryptLocal(str) { return btoa(xorCipher(str)); }

            function dataUrlToUploadPayload(dataUrl, fileName, mimeType, desiredFileName) {
                if (!isDataUrl(dataUrl)) return null;
                const parts = dataUrl.split(',');
                if (parts.length < 2) return null;
                const header = parts[0];
                const inferredMime = (header.match(/data:(.*?);base64/) || [])[1] || mimeType || 'application/octet-stream';
                return {
                    base64Data: parts[1],
                    fileName: fileName || ('student_doc_' + Date.now()),
                    mimeType: mimeType || inferredMime,
                    desiredFileName: desiredFileName || fileName || ('student_doc_' + Date.now())
                };
            }
            function sanitizeFileNamePart(value) {
                return String(value || '')
                    .replace(/[\\/:*?"<>|#%]/g, ' ')

            }
            function getFileExtension(fileName, mimeType) {
                const matched = String(fileName || '').match(/\.([a-zA-Z0-9]+)$/);
                if (matched) return matched[1];
                const typeMap = { 'application/pdf': 'pdf', 'image/jpeg': 'jpg', 'image/jpg': 'jpg', 'image/png': 'png', 'image/webp': 'webp' };
                return typeMap[String(mimeType || '').toLowerCase()] || 'bin';
            }
            function buildDriveDocumentFileName(record, fallbackFileName, mimeType) {
                const ext = getFileExtension(fallbackFileName, mimeType);

                const rawId = (record && record.id) ? record.id : 'NEW';
                return sanitizeFileNamePart(rawId + "_" + fullName) + "." + ext;
            }

                const fallback = `Certificate.html${safeId ? `?id=${encodeURIComponent(safeId)}` : ''}`;
                const rawBaseUrl = String(baseUrl || '').trim();
                if (rawBaseUrl) {

            function parseDateParts(dateStr) {
                if (dateStr === null || dateStr === undefined || dateStr === '') return null;

                // Date object from Sheets support
                if (Object.prototype.toString.call(dateStr) === '[object Date]' && !isNaN(dateStr)) {
                    return {
                        y: String(dateStr.getFullYear()),
                        m: String(dateStr.getMonth() + 1).padStart(2, '0'),
                        d: String(dateStr.getDate()).padStart(2, '0')
                    };
                }

                let s = String(dateStr).trim();
                if (!s) return null;

                // ISO date support: 2024-11-10T18:30:00.000Z
                const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
                if (iso) return { y: iso[1], m: iso[2], d: iso[3] };

                s = s.replace(/[\/\.]/g, '-');
                const monthMap = { jan: '01', feb: '02', mar: '03', apr: '04', may: '05', jun: '06', jul: '07', aug: '08', sep: '09', oct: '10', nov: '11', dec: '12' };
                const parts = s.split(/[\s-]+/).filter(Boolean);
                if (parts.length < 3) return null;

                let d = '', m = '', y = '';
                if (parts[0].length === 4) { y = parts[0]; m = parts[1]; d = parts[2]; }
                else { d = parts[0]; m = parts[1]; y = parts[2]; }

                const mk = String(m).toLowerCase().slice(0, 3);
                if (monthMap[mk]) m = monthMap[mk];
                m = String(m).padStart(2, '0');
                d = String(d).padStart(2, '0');

                return { y, m, d };
            }
            function formatDateDdMmYyyy(dateStr) {
                const p = parseDateParts(dateStr);
                if (!p || !p.y || !p.m || !p.d) return String(dateStr || '').trim();
                return `${p.d}-${p.m}-${p.y}`;
            }
            function normalizeDateInputField() {
                const input = document.getElementById('in-date');
                if (!input) return '';
                const rawValue = String(input.value || '').trim();
                if (rawValue) input.dataset.displayDate = rawValue;
                const normalized = formatDateDdMmYyyy(input.value);
                input.value = normalized;
                return normalized;
            }


            function getTimePassed(dateStr) {
                const p = parseDateParts(dateStr);
                if (!p || !p.y) return '';
                const now = new Date();
                const nikahDate = new Date(`${p.y}-${p.m}-${p.d}`);
                const diffMs = now - nikahDate;
                const diffYears = Math.floor(diffMs / (1000 * 60 * 60 * 24 * 365));
                if (diffYears > 0) return `${diffYears} Y`;
                const diffMonths = Math.floor(diffMs / (1000 * 60 * 60 * 24 * 30));
                if (diffMonths > 0) return `${diffMonths} M`;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                return `${diffDays} D`;
            }
            function calculateStudentAge(dob) {
                if (!dob) return '--';
                const p = parseDateParts(dob);
                if (!p || !p.y || !p.m || !p.d) return '--';
                const birthDate = new Date(`${p.y}-${p.m}-${p.d}`);
                if (Number.isNaN(birthDate.getTime())) return '--';
                const today = new Date();
                let age = today.getFullYear() - birthDate.getFullYear();
                const monthDiff = today.getMonth() - birthDate.getMonth();
                if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) age--;
                return age >= 0 ? age : '--';
            }

            function setupAutoSlide() {

                    const id = el.id || 'slide-' + index; el.id = id;
                    if (scrollIntervals[id]) clearInterval(scrollIntervals[id]);

                    // Speed fix: fixed interval 100ms for slow and steady speed
                    const startScrolling = () => {
                        scrollIntervals[id] = setInterval(() => {
                            if (el.scrollHeight > el.clientHeight) {
                                el.scrollTop += 1;
                                if (el.scrollTop + el.clientHeight >= el.scrollHeight) el.scrollTop = 0;
                            }
                        }, 100);
                    };

                    startScrolling();
                    el.addEventListener('mouseenter', () => clearInterval(scrollIntervals[id]));
                    el.addEventListener('mouseleave', () => startScrolling());
                });

            function positionFloatingMenu(menu, anchor, options = {}) {
                if (!menu || !anchor) return;
                const { align = 'left', gap = 6, minWidth = 0, fixed = false } = options;
                const viewportPadding = 12;
                const anchorRect = anchor.getBoundingClientRect();
                const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
                const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
                const spaceBelow = viewportHeight - anchorRect.bottom - viewportPadding;
                const spaceAbove = anchorRect.top - viewportPadding;
                const openUp = spaceBelow < 180 && spaceAbove > spaceBelow;
                const maxHeight = Math.max(140, Math.min(520, openUp ? spaceAbove - gap : spaceBelow - gap));
                const preferredWidth = Math.max(minWidth || 0, anchorRect.width, menu.scrollWidth);
                const safeWidth = Math.min(Math.max(preferredWidth, minWidth || 0), viewportWidth - (viewportPadding * 2));

                menu.style.minWidth = `${Math.max(minWidth || 0, anchorRect.width)}px`;
                menu.style.width = 'max-content';
                menu.style.maxWidth = `${Math.max(180, viewportWidth - (viewportPadding * 2))}px`;
                menu.style.maxHeight = `${maxHeight}px`;
                menu.style.top = openUp ? 'auto' : `calc(100% + ${gap}px)`;
                menu.style.bottom = openUp ? `calc(100% + ${gap}px)` : 'auto';
                menu.style.left = align === 'left' ? '0' : 'auto';
                menu.style.right = align === 'right' ? '0' : 'auto';

                if (fixed) {
                    menu.style.position = 'fixed';
                    menu.style.left = `${Math.max(viewportPadding, Math.min(anchorRect.left, viewportWidth - safeWidth - viewportPadding))}px`;
                    menu.style.right = 'auto';
                    menu.style.top = openUp ? `${Math.max(viewportPadding, anchorRect.top - maxHeight - gap)}px` : `${anchorRect.bottom + gap}px`;
                    menu.style.bottom = 'auto';
                    menu.style.minWidth = `${Math.max(minWidth || 0, Math.min(anchorRect.width, safeWidth))}px`;
                    menu.style.width = `${safeWidth}px`;
                }
            }

                    return {

                            const si = (schoolConfig.name || "DPS").trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase() || "DPS";
                            if (isRecVerified) {
                                const snVal = (r.sn && Number(r.sn) < 1000000000) ? r.sn : (index + 1);
                                const year = new Date(r.createdAt || Date.now()).getFullYear().toString().slice(-2);
                                return si + year + String(snVal).padStart(3, '0');
                            } else {
                                return si + 'Draft' + String(r.createdAt || Date.now()).slice(-3);
                            }
                        })(),

                        'Father Name': r.fatherName || '',

            function importFromExcel(input) {
                const file = input.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = function (e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(firstSheet);
                    const records = [];
                    const excelDateToJSDate = (serial) => {
                        if (typeof serial === 'string') return serial;
                        const utc_days = Math.floor(serial - 25569);
                        const utc_value = utc_days * 86400;
                        const date_info = new Date(utc_value * 1000);
                        return `${String(date_info.getDate()).padStart(2, '0')}-${String(date_info.getMonth() + 1).padStart(2, '0')}-${date_info.getFullYear()}`;
                    }
                    json.forEach(row => {
                        const getVal = (k) => row[k] || row[Object.keys(row).find(key => key && key.toLowerCase().includes(k.toLowerCase()))] || '';
                        const rec = {
                            id: getVal('Id No') || getVal('id') || `TEMP_${Date.now()}_${Math.floor(Math.random() * 10000)}`,
                            sn: getVal('Sn') || '',
                            studentName: getVal('Student Name') || getVal('Student_Name') || getVal('Name'),
                            fatherName: getVal('Father Name') || getVal('Father_Name') || getVal('Father'),
                            dob: excelDateToJSDate(getVal('DOB') || getVal('Date of Birth') || ''),
                            mobile: getVal('Mobile') || getVal('Phone'),
                            address: getVal('Address') || getVal('Place'),
                            sclass: getVal('Class') || getVal('Standard'),
                            gender: getVal('Gender') || getVal('Sex'),
                            fileName: getVal('Photo Name') || getVal('fileName') || '',
                            docUrl: getVal('Photo Link') || getVal('docUrl') || '',
                            photoData: '', docFileId: '', docMimeType: '', docSize: ''
                        };
                        if (rec.studentName) records.push(rec);
                    });
                    if (records.length === 0) { showModal('error', 'Failed', 'No valid student records found.'); closeAllMenus(); input.value = ''; return; }
                    serverCall('addManyRecords', [records], (count) => {
                        showModal('success', 'Import Successful', `Successfully imported ${count || records.length} records into the system.`);
                        loadAllData();
                        closeAllMenus(); input.value = '';
                    });
                };
                reader.readAsArrayBuffer(file);
            }

            function normalizeRecordId(id) {
                return String(id == null ? '' : id).trim();
            }

            function findRecordById(list, id) {
                const normalizedId = normalizeRecordId(id);
                return (Array.isArray(list) ? list : []).find(x => normalizeRecordId(x && x.id) === normalizedId) || null;
            }

            function storeRecordInDb(record) {
                if (!record || !normalizeRecordId(record.id)) return;
                const existingIndex = db.findIndex((item) => normalizeRecordId(item && item.id) === normalizeRecordId(record.id));
                if (existingIndex >= 0) {
                    db[existingIndex] = record;
                    return;
                }
                db.unshift(record);
            }

            function withRecord(id, onFound) {
                const localRecord = findRecordById(db, id);
                if (localRecord) {
                    onFound(localRecord);
                    return;
                }
                serverCall('getRecordById', [normalizeRecordId(id)], (fetched) => {
                    if (!fetched || !normalizeRecordId(fetched.id)) {
                        showModal('error', 'Error', 'Record not found');
                        return;
                    }
                    storeRecordInDb(fetched);
                    onFound(fetched);
                });
            }

            function escapeInlineId(id) {
                return normalizeRecordId(id).replace(/\\/g, '\\\\').replace(/'/g, "\\'");

            function addActivity(action, rec) {
                const log = JSON.parse(localStorage.getItem(ACTIVITY_KEY) || '[]');
                const entry = {
                    action: action,
                    sanad: rec && rec.sanad ? rec.sanad : '',
                    gname: rec && rec.gname ? rec.gname : '',
                    bname: rec && rec.bname ? rec.bname : '',
                    time: new Date().toLocaleString(),
                    user: getCurrentUserName()
                };
                log.push(entry);

                };

                progressText.textContent = `${Math.round(Math.max(8, Math.min(100, progress)))}%`;

            function saveRecord() {

            function proceedSave() {
                if (isSavingRecord) return;
                isSavingRecord = true;
                try {
                    const getCfg = (id) => fb_standard_config[id] || { enabled: true, required: false };
                    const getVal = (id) => {
                        const el = document.getElementById('blank-' + id) || document.getElementById('in-' + id);
                        return el ? el.value : '';
                    };

                    const cl = getCfg('sclass').enabled ? getVal('sclass') : 'General';
                    const g = getCfg('gender').enabled ? getVal('gender') : 'Other';
                    const dateVal = getCfg('dob').enabled ? getVal('dob') : '';
                    const n = getCfg('studentName').enabled ? getVal('studentName') : 'Unnamed Student';

                    let missing = [];
                    
                    // 1. Photo validation
                    const eid = document.getElementById('edit-id').value;
                    const existing = eid ? findRecordById(db, eid) : null;
                    const hasPendingOrSavedDoc = !!photoData || !!pendingUploadedDocument || (hasRecordDocument(existing) && !removeExistingDocument);
                    if (getCfg('photo').enabled && getCfg('photo').required && !hasPendingOrSavedDoc) missing.push('Student Photo');

                    // 2. Standard field validations
                    if (getCfg('studentName').enabled && getCfg('studentName').required && !n.trim()) missing.push('Student Name');
                    
                    const fatherVal = getCfg('fatherName').enabled ? getVal('fatherName') : '';
                    if (getCfg('fatherName').enabled && getCfg('fatherName').required && !fatherVal.trim()) missing.push("Father's Name");
                    
                    if (getCfg('sclass').enabled && getCfg('sclass').required && !cl) missing.push('Class');
                    if (getCfg('gender').enabled && getCfg('gender').required && !g) missing.push('Gender');
                    if (getCfg('dob').enabled && getCfg('dob').required && !dateVal) missing.push('DOB');

                    const mobileValue = sanitizeMobileInput(getVal('mobile'));
                    if (getCfg('mobile').enabled && getCfg('mobile').required && !mobileValue) missing.push('Mobile');

                    const aadharVal = getCfg('aadhar').enabled ? getVal('aadhar') : '';
                    if (getCfg('aadhar').enabled && getCfg('aadhar').required && !aadharVal.trim()) missing.push('Aadhar Number');

                    const addressVal = getCfg('address').enabled ? getVal('address') : '';
                    if (getCfg('address').enabled && getCfg('address').required && !addressVal.trim()) missing.push('Address');

                    // 3. Custom field validations
                    fb_fields.forEach(f => {
                        const el = document.getElementById('in-customField' + (fb_fields.indexOf(f) + 1));
                        if (f.required && el && !el.value.trim()) missing.push(f.label);
                    });

                    if (missing.length > 0) {
                        isSavingRecord = false;
                        const reqMsg = `* ${missing[0]} Required`;
                        showToast(reqMsg);
                        setTimeout(() => setSyncStatus(''), 2500);
                        return;
                    }

                    // Calculate Local SN if missing
                    let nextSn = existing ? existing.sn : null;
                    if (!nextSn) {
                        nextSn = Date.now();
                    }

                    // Check duplicate record locally (Student Name, Father Name, Class)
                    const nLower = n.trim().toLowerCase();
                    const fatherLower = fatherVal.trim().toLowerCase();
                    const clLower = cl.trim().toLowerCase();
                    let duplicate = null;
                    if (!eid) {
                        duplicate = db.find(r => {
                            if (typeof draftServerRecordId !== 'undefined' && draftServerRecordId && String(r.id) === String(draftServerRecordId)) return false;
                            if (!nLower) return false;
                            const rName = (r.studentName || '').trim().toLowerCase();
                            const rFather = (r.fatherName || '').trim().toLowerCase();
                            const rClass = (r.sclass || '').trim().toLowerCase();
                            return rName === nLower && rFather === fatherLower && rClass === clLower;
                        });
                    }
                    
                    if (duplicate && !proceedSave.bypassDuplicateCheck) {
                        isSavingRecord = false;
                        showModal('confirm', 
                            'Duplicate Entry Found!', 
                            `An existing record was found with Student Name: <span class="text-slate-900 font-bold text-[15px]">"${n}"</span>, Father Name: <span class="text-slate-900 font-bold text-[15px]">"${fatherVal}"</span>, and Class: <span class="text-slate-900 font-bold text-[15px]">"${cl}"</span>.<br><br>Would you like to open the existing record or proceed to create a new one?`, 
                            () => {
                                proceedSave.bypassDuplicateCheck = true;
                                proceedSave();
                            }, 
                            'Create New'
                        );
                        
                        // Show close icon at top right
                        const closeIcon = document.getElementById('modal-close-icon');
                        if (closeIcon) closeIcon.classList.remove('hidden');

                        // Customize modal actions to support "Open Existing", "Create New"
                        const actions = document.getElementById('modal-actions');
                        if (actions) {
                            actions.innerHTML = `
                                <div class="w-full flex flex-col gap-3">
                                    <div class="flex gap-3 w-full">
                                        <button id="modal-load-old-btn" class="flex-1 py-3 bg-emerald-500 text-white rounded-[18px] font-bold flex items-center justify-center gap-2 transition active:scale-95 shadow-sm"><i class="fa-solid fa-folder-open text-xs"></i> Open Existing</button>
                                        <button id="modal-confirm-btn" class="flex-1 py-3 bg-amber-500 text-white rounded-[18px] font-bold flex items-center justify-center gap-2 transition active:scale-95 shadow-sm"><i class="fa-solid fa-plus text-xs"></i> Create New</button>
                                    </div>
                                </div>
                            `;
                            
                            // Bind "Load Old" button
                            document.getElementById('modal-load-old-btn').onclick = () => {
                                closeModal();
                                populateFormFromRecord(duplicate);
                            };
                            
                            // Bind "Phir bhi New" button
                            document.getElementById('modal-confirm-btn').onclick = () => {
                                closeModal();
                                proceedSave.bypassDuplicateCheck = true;
                                proceedSave();
                            };
                        }
                        return;
                    }
                    proceedSave.bypassDuplicateCheck = false;

                    toggleSaveLoading(true);
                    const nowTs = Date.now();
                    const deviceInfo = (navigator.userAgent.includes('Android') || navigator.userAgent.includes('iPhone')) ? 'Mobile' : 'Desktop';

                    let finalId = eid || '';
                    let oldId = '';

                    // Use reserved ID if available, otherwise Generate Draft ID
                    let isNewDraft = false;
                    if (!finalId || finalId === '') {
                        if (draftServerRecordId && draftServerRecordId !== '') {
                            finalId = draftServerRecordId;
                        } else {
                            isNewDraft = true;
                            finalId = 'draft_' + Date.now() + '_' + Math.floor(Math.random()*1000);
                        }
                        const inIdEl = document.getElementById('in-idno');
                        if (inIdEl) inIdEl.value = finalId;
                    }

                    const rec = {
                        sn: nextSn,
                        id: finalId,
                        oldId: oldId, // Send old ID to server so it can replace the row
                        sclass: cl, gender: g, studentName: n,
                        fatherName: getVal('fatherName'),
                        dob: dateVal, mobile: mobileValue,
                        aadhar: getVal('aadhar'),
                        address: addressVal,
                        photoData: photoData ? photoData : (existing && !removeExistingDocument ? (existing.photoData || '') : ''),
                        fileName: (photoData || pendingUploadedDocument) ? (finalId + '_' + n.replace(/\s+/g, '_') + '.jpg') : (existing ? (existing.fileName || '') : ''),
                        docFileId: (pendingUploadedDocument ? pendingUploadedDocument.fileId : (existing ? existing.docFileId : '')),
                        docUrl: (pendingUploadedDocument ? (pendingUploadedDocument.url || '') : (existing && !removeExistingDocument ? existing.docUrl : '')),
                        docMimeType: (pendingUploadedDocument ? pendingUploadedDocument.mimeType : (existing ? existing.docMimeType : currentFileType)),
                        docSize: (pendingUploadedDocument ? pendingUploadedDocument.size : (existing ? existing.docSize : '')),
                        createdBy: eid ? ((existing && existing.createdBy) || getCurrentUserName()) : getCurrentUserName(),
                        updatedBy: getCurrentUserName(),
                        createdAt: eid ? ((existing && existing.createdAt) || nowTs) : nowTs,
                        updatedAt: nowTs, 
                        draftStatus: (eid || isPendingBatch) ? '' : 'DRAFT',
                        verified: (existing && (String(existing.verified).toLowerCase() === 'returned' || existing.returned === true || String(existing.returned).toLowerCase() === 'true' || String(existing.status).toLowerCase() === 'returned')) ? false : !!(existing && existing.verified && String(existing.verified).toLowerCase() !== 'false'),
                        returned: false,
                        isRestored: false,
                        status: (existing && existing.verified && String(existing.verified).toLowerCase() !== 'false' && !(String(existing.verified).toLowerCase() === 'returned' || existing.returned === true || String(existing.returned).toLowerCase() === 'true' || String(existing.status).toLowerCase() === 'returned')) ? existing.status : (hasPendingOrSavedDoc ? 'unverified' : 'pending'),
                        _serverSaved: existing ? !!existing._serverSaved : false,
                        // Preserved metadata fields
                        timestamp: existing ? (existing.timestamp || getFormattedTimestamp(nowTs)) : getFormattedTimestamp(nowTs),
                        location: existing ? (existing.location || currentUserLocation) : currentUserLocation,
                        deviceInfo: existing ? (existing.deviceInfo || (deviceInfo + ' (' + navigator.platform + ')')) : (deviceInfo + ' (' + navigator.platform + ')'),
                        verifiedBy: existing ? (existing.verifiedBy || '') : '',
                        verifiedAt: existing ? (existing.verifiedAt || '') : ''
                    };

                    fb_fields.forEach((f, i) => {
                        rec['customField' + (i + 1)] = getVal('customField' + (i + 1));
                    });

                    previewRecord = rec;
                    const action = (eid) ? 'updateRecord' : 'addRecord';

                    const _getPreviewPhotoSrc = () => {
                        if (photoData && photoData.startsWith('data:image')) return photoData;
                        if (pendingUploadedDocument && pendingUploadedDocument.url) return fixDriveImageUrl(pendingUploadedDocument.url);
                        if (existing && existing.docUrl) return fixDriveImageUrl(existing.docUrl);
                        return '';
                    };

                    const finalizeSave = () => {
                        isSavingRecord = false;
                        toggleSaveLoading(false);
                        addActivity(eid ? 'UPDATE' : 'ADD', rec);
                        if (!eid) clearDraft();
                        const existingInDb = db.find(r => String(r.id) === String(rec.id));
                        if (existingInDb) {
                            rec._pending = existingInDb._pending;
                            rec._syncStatus = existingInDb._syncStatus;
                            rec._serverSaved = existingInDb._serverSaved;
                        }
                        storeRecordInDb(rec);
                        renderHomeAnalysis();
                        filterRecords();
                        if (eid) {
                            showModal('success', 'Data Updated Successfully', '', null, 'Yes, Delete', `${(n || '').trim()}'s Data`);
                        }
                        setSyncStatus('');
                        if (blankRecordMode === 'preview') renderCurrentRecordsPage();
                    };

                    isPreviewFromSave = !eid;
                    const _immediatePhotoSrc = _getPreviewPhotoSrc();
                    previewRecord = { ...rec, _displayPhotoSrc: _immediatePhotoSrc, _isUnsaved: !eid, _eid: eid };
                    
                    if (eid) {
                        try { if (window.idbPut) idbPut(IDB_STORE_RECORDS, previewRecord).catch(()=>{}); } catch(e){}
                        serverCallSilent('updateRecord', [previewRecord], () => {});
                        finalizeSave();
                        closeStudentForm();
                    } else {
                        isSavingRecord = false;
                        toggleSaveLoading(false);
                        setBlankRecordMode('preview');
                    }

                    // Data is no longer saved locally or remotely here for add mode.
                    // It will be saved when "Save & New" or "Verify" is clicked on the preview card.
                } catch (error) {
                    console.error('Save error:', error);
                    isSavingRecord = false;
                    toggleSaveLoading(false);
                }
            }

            function toggleRecordSelection(id, event) {
                syncSelectedRecordsSection();
                if (event) event.stopPropagation();
                const strId = String(id);
                const wasEmpty = selectedRecords.size === 0;
                const isSelectedNow = !selectedRecords.has(strId);
                
                if (isSelectedNow) {
                    selectedRecords.add(strId);

                        async function bulkExportSelected() {
                if (selectedRecords.size === 0) return;
                
                showToast("Preparing Export... Please wait.");
                const btn = document.getElementById('btn-bulk-export');
                if(btn) btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-[16px]"></i>';
                
                try {
                    const zip = new JSZip();
                    const exportData = [];
                    const recordsToExport = [];
                    
                    selectedRecords.forEach(id => {
                        const rec = db.find(x => String(x.id) === String(id));
                        if (rec) recordsToExport.push(rec);
                    });
                    
                    const qrEnabled = localStorage.getItem('identify_qr_enabled') === 'true';
                    const savedQrFields = JSON.parse(localStorage.getItem('identify_qr_fields') || '["id"]');
                    
                    for (let i = 0; i < recordsToExport.length; i++) {
                        const rec = recordsToExport[i];
                        
                        const safeClass = (rec.sclass || 'Unknown_Class').replace(/[^a-zA-Z0-9\s]/g, '_').trim();
                        const safeName = (rec.studentName || 'Unknown_Name').replace(/[^a-zA-Z0-9\s]/g, '_').trim();
                        const baseFilename = `${safeClass}_${safeName}`;
                        
                        let qrFileName = "";
                        if (qrEnabled) {
                            try {
                                let qrLines = [];
                                savedQrFields.forEach(f => {
                                    let label = f.toUpperCase();
                                    if (f === 'id') label = 'System ID';
                                    else if (typeof FB_STANDARD_FIELDS !== 'undefined' && FB_STANDARD_FIELDS.some(sf => sf.id === f)) {
                                        label = typeof fb_getStandardLabel === 'function' ? fb_getStandardLabel(f, FB_STANDARD_FIELDS.find(sf => sf.id === f).label) : FB_STANDARD_FIELDS.find(sf => sf.id === f).label;
                                    } else if (typeof fb_fields !== 'undefined' && fb_fields.some(cf => cf.id === f)) {
                                        label = fb_fields.find(cf => cf.id === f).label || f;
                                    }
                                    qrLines.push(`${label}: ${rec[f] || "-"}`);
                                });
                                let qrVal = qrLines.join('\n');
                                const qr = new QRious({
                                    value: qrVal,
                                    size: 300,
                                    level: 'H'
                                });
                                const qrBase64 = qr.toDataURL().split(',')[1];
                                qrFileName = `QR_${baseFilename}.png`;
                                zip.file(`QR_Codes/${qrFileName}`, qrBase64, {base64: true});
                            } catch(e) { console.error("QR Error", e); }
                        }
                        
                        let photoFileName = "";
                        let photoUrl = rec.docUrl || rec.photoData;
                        if (photoUrl) {
                            photoFileName = `${baseFilename}.jpg`;
                            try {
                                if (photoUrl.startsWith('data:image')) {
                                    const base64Data = photoUrl.split(',')[1];
                                    zip.file(`Photos/${photoFileName}`, base64Data, {base64: true});
                                } else {
                                    photoUrl = fixDriveImageUrl(photoUrl);
                                    const response = await fetch(photoUrl, { mode: 'cors' });
                                    if (response.ok) {
                                        const blob = await response.blob();
                                        zip.file(`Photos/${photoFileName}`, blob);
                                    } else {
                                        console.warn("Failed to fetch photo for", baseFilename);
                                    }
                                }
                            } catch(e) {
                                console.error("Photo Error", e);
                            }
                        }
                        
                        // Yield to main thread every 10 records to prevent browser freeze/crash
                        if (i > 0 && i % 10 === 0) {
                            await new Promise(r => setTimeout(r, 0));
                        }
                        
                        exportData.push({
                            "ID": rec.id || "",
                            "Student Name": rec.studentName || "",
                            "Class": rec.sclass || "",
                            "Father Name": rec.fatherName || "",
                            "Mother Name": rec.motherName || "",
                            "DOB": rec.dob || "",
                            "Blood Group": rec.bloodGroup || "",
                            "Address": rec.address || "",
                            "Mobile 1": rec.mobile1 || "",
                            "Mobile 2": rec.mobile2 || "",
                            "Transport": rec.transport || "",
                            "House": rec.house || "",
                            "Aadhar": rec.aadhar || "",
                            "Admission No": rec.admissionNo || "",
                            "Status": rec.status || "",
                            "Verified": rec.verified || "",
                            "Photo File": photoFileName,
                            "QR File": qrFileName
                        });
                    }
                    
                    showToast("Zipping files...");
                    
                    const ws = XLSX.utils.json_to_sheet(exportData);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Completed_Data");
                    const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    zip.file("Data_Export.xlsx", excelBuffer);
                    
                    const zipBlob = await zip.generateAsync({ type: "blob" });
                    
                    const downloadLink = document.createElement("a");
                    downloadLink.href = URL.createObjectURL(zipBlob);
                    downloadLink.download = "Completed_Data_Export.zip";
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);
                    
                    resetBulkSelection();
                    showToast("Export Successful!");
                    
                } catch (error) {
                    console.error(error);
                    showModal('alert', 'Export Failed', 'An error occurred during export. Check console.');
                } finally {
                    if(btn) btn.innerHTML = '<i class="fa-solid fa-file-export text-[16px]"></i>';
                }
            }

            function filterRecords() {
                const globalSearch = document.getElementById('global-search');
                const mainSearch = document.getElementById('mainSearch');
                const q = (globalSearch?.value || mainSearch?.value || '').toLowerCase().trim();

                const res = db.filter(x => {
                    const s = (v) => (v || '').toLowerCase();
                    const matchesText = !q || (s(x.sclass).includes(q) || s(x.studentName).includes(q) || s(x.fatherName).includes(q) || s(x.mobile).includes(q) || s(x.aadhar).includes(q) || s(x.address).includes(q) || s(x.id).includes(q));
                    let matchesStatus = true;
                    // Lower threshold (10 instead of 30) to catch all photo types reliably
                    // Robust verification check
                    const isReturned = (String(x.verified).toLowerCase() === 'returned' || String(x.status).toLowerCase() === 'returned' || x.returned === true || String(x.returned).toLowerCase() === 'true');
                    const isRecVerified = (x.verified === true || String(x.verified).toLowerCase() === 'true' || x.verified === 'Completed') && !isReturned;
                    const hasAppPhoto = (x.docUrl && x.docUrl.length > 10) || (x.photoData && x.photoData.length > 10) || (x.docFileId && String(x.docFileId).length > 5);

                    let matchesClass = true;
                    if (activeClassFilter !== 'all') matchesClass = (x.sclass === activeClassFilter);

                    if (activeStatusFilter === 'recycleBin') {
                        return (x.isDeleted === true || String(x.isDeleted).toLowerCase() === 'true') && matchesText && matchesClass;
                    }
                    if (x.isDeleted === true || String(x.isDeleted).toLowerCase() === 'true') {
                        return false;
                    }

                    if (currentUser && currentUser.userId === 'admin') {
                        // Admin should not see pending records (without photos)
                        if (activeStatusFilter === 'pending' || (!isRecVerified && !hasAppPhoto)) {
                            return false;
                        }
                    }

                    if (activeStatusFilter === 'verified') {
                        matchesStatus = isRecVerified;
                    } else if (activeStatusFilter === 'unverified') {
                        matchesStatus = (!isRecVerified && hasAppPhoto) || isReturned;
                    } else if (activeStatusFilter === 'pending') {
                        matchesStatus = (!isRecVerified && !hasAppPhoto) && !isReturned;
                    }


                    return matchesText && matchesStatus && matchesClass;
                });
                renderRecords(res);
            }

            function getDataInfoStats(records) {
                const makeStats = (label) => ({ label, all: 0, verified: 0, unverified: 0, pending: 0 });
                const classMap = {};
                const total = makeStats('Total');

                (records || []).forEach((r) => {
                    const className = (r.sclass || 'No Class').trim() || 'No Class';
                    if (!classMap[className]) classMap[className] = makeStats(className);
                    const statsList = [classMap[className], total];
                    const isReturned = (String(r.verified).toLowerCase() === 'returned' || String(r.status).toLowerCase() === 'returned' || r.returned === true || String(r.returned).toLowerCase() === 'true');
                    const isRecVerified = (r.verified === true || String(r.verified).toLowerCase() === 'true') && !isReturned;
                    const isRecCompleted = (r.verified === 'Completed') && !isReturned;
                    const hasAppPhoto = (r.docUrl && r.docUrl.length > 10) || (r.photoData && r.photoData.length > 10) || (r.docFileId && String(r.docFileId).length > 5);

                    statsList.forEach((stats) => {
                        stats.all++;
                        if (isRecVerified) stats.verified++;
                        else if (hasAppPhoto || isReturned) stats.unverified++;
                        else stats.pending++;
                    });
                });

                const classes = Object.values(classMap).sort((a, b) => a.label.localeCompare(b.label, undefined, { numeric: true, sensitivity: 'base' }));
                return { classes, total };
            }

            function populateFilters(classesOverride) {
                const classMenu = document.getElementById('filterClassMenu');

                if (!classMenu) return;

                const preferredOrder = ['Nursery', 'KG-1', 'KG-2', 'Class 1', 'Class 2', 'Class 3', 'Class 4', 'Class 5'];

                let orderedClasses = [];
                let counts = {};

                let dbToCount = db;
                if (currentUser && currentUser.userId === 'admin') {
                    dbToCount = db.filter(r => {
                        const isReturned = (String(r.verified).toLowerCase() === 'returned' || String(r.status).toLowerCase() === 'returned' || r.returned === true || String(r.returned).toLowerCase() === 'true');
                        return (r.verified === 'Completed' || r.verified === true || String(r.verified).toLowerCase() === 'true') && !isReturned;
                    });
                }

                if (Array.isArray(classesOverride) && classesOverride.length > 0) {
                    // Use the list provided from the database
                    orderedClasses = classesOverride;
                    // Also need counts from current db for UI numbers
                    dbToCount.forEach(record => {
                        const className = (record && record.sclass ? String(record.sclass).trim() : '');
                        if (className) counts[className] = (counts[className] || 0) + 1;
                    });
                } else {
                    // Default behavior: extract from current db array
                    counts = dbToCount.reduce((acc, record) => {
                        const className = (record && record.sclass ? String(record.sclass).trim() : '');
                        if (!className) return acc;
                        acc[className] = (acc[className] || 0) + 1;
                        return acc;
                    }, {});

                    const extraClasses = Object.keys(counts)
                        .filter(name => !preferredOrder.includes(name))
                        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
                    orderedClasses = [...preferredOrder.filter(name => counts[name]), ...extraClasses];
                }

                const items = [
                    { value: 'all', label: 'All Class', count: dbToCount.length }

                        value: name,
                        label: name,
