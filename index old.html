<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDentify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { firebaseConfig } from "./firebase-env.js";

        try {
            window.firebaseLoadedInIndex = true;
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    if (user.email && (user.email.toLowerCase().includes('admin') || user.email.toLowerCase() === 'identify.jvd@gmail.com')) {
                        window.location.replace('Admin_Panel.html');
                    } else {
                        window.location.replace('School_Panel.html');
                    }
                } else {
                    window.location.replace('Login_Panel.html');
                }
            });
        } catch (e) {
            console.error("Routing error:", e);
            window.location.replace('Login_Panel.html');
        }
    </script>
    <script>
        // Fallback: If Firebase module fails to execute (e.g. adblocker, github pages path issues), redirect to Login after 3 seconds.
        setTimeout(() => {
            if (!window.firebaseLoadedInIndex) {
                console.warn("Firebase took too long to load or failed. Redirecting to Login...");
                window.location.replace('Login_Panel.html');
            }
        }, 3000);
    </script>
</head>

<body class="bg-[#f8fafd] m-0 p-0 font-sans h-screen flex flex-col items-center justify-center">
    
    <div class="flex flex-col items-center justify-center drop-shadow-2xl -mt-96">
        <img src="./idapplogo.png" class="w-[180px] h-[180px] object-contain mix-blend-multiply">
    </div>
    <!-- 3 Loading Dots -->
    <div class="flex gap-2 mt-4 items-center justify-center absolute top-1/2 mt-12">
        <div class="w-3 h-3 bg-[#05996c] rounded-full animate-bounce" style="animation-delay: 0s"></div>
        <div class="w-3 h-3 bg-[#05996c] rounded-full animate-bounce" style="animation-delay: 0.15s"></div>
        <div class="w-3 h-3 bg-[#05996c] rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>

</html>
