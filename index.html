<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { firebaseConfig } from "./firebase-env.js";

        try {
            window.firebaseLoadedInIndex = true;
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    if (user.email && (user.email.toLowerCase().includes('admin') || user.email.toLowerCase() === 'identify.jvd@gmail.com')) {
                        window.location.replace('Admin_Panel.html');
                    } else {
                        window.location.replace('School_Panel.html');
                    }
                } else {
                    window.location.replace('Login_Panel.html');
                }
            });
        } catch (e) {
            console.error("Routing error:", e);
            window.location.replace('Login_Panel.html');
        }
    </script>
    <script>
        // Fallback: If Firebase module fails to execute (e.g. adblocker, github pages path issues), redirect to Login after 3 seconds.
        setTimeout(() => {
            if (!window.firebaseLoadedInIndex) {
                console.warn("Firebase took too long to load or failed. Redirecting to Login...");
                window.location.replace('Login_Panel.html');
            }
        }, 3000);
    </script>
</head>

<body style="margin: 0; padding: 0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #f8fafd; color: #444746;">
    <div style="text-align: center;">
        <div style="width: 48px; height: 48px; border: 4px solid #10b981; border-top-color: transparent; border-radius: 50%; animate: spin 1s linear infinite; margin: 0 auto 16px; animation: spin 1s linear infinite;"></div>
        <div style="font-weight: 600; font-size: 16px;">Redirecting...</div>
    </div>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>

</html>
